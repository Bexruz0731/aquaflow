<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ffffff" />
    <title>AkoWater — Buyurtma berish</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Force reload when a new build is deployed — clears Telegram's cached mini app
      var BUILD_TS = '__BUILD_TS__';
      var stored = localStorage.getItem('_bts');
      if (stored && stored !== BUILD_TS) {
        localStorage.setItem('_bts', BUILD_TS);
        window.location.reload(true);
      } else {
        localStorage.setItem('_bts', BUILD_TS);
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
