worker_processes auto;
events { worker_connections 2048; }

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    upstream api {
        server backend:8000;
        keepalive 16;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — main
    server {
        listen 443 ssl http2;
        server_name app.suvpro.uz;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;

        # API
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60s;
        }

        # Auth endpoints — stricter rate limit
        location /api/v1/auth/login {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Bot webhook
        location /bot/ {
            proxy_pass http://bot:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Static uploads
        location /uploads/ {
            alias /var/www/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Web admin panel
        location /admin {
            alias /var/www/web;
            index index.html;
            try_files $uri $uri/ /admin/index.html;
            expires -1;
            add_header Cache-Control "no-store";
        }
        location /admin/assets/ {
            alias /var/www/web/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Client Mini App
        location /client {
            alias /var/www/client;
            index index.html;
            try_files $uri $uri/ /client/index.html;
            expires -1;
            add_header Cache-Control "no-store";
        }
        location /client/assets/ {
            alias /var/www/client/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Courier Mini App
        location /courier {
            alias /var/www/courier;
            index index.html;
            try_files $uri $uri/ /courier/index.html;
            expires -1;
            add_header Cache-Control "no-store";
        }
        location /courier/assets/ {
            alias /var/www/courier/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Health check (public)
        location /health {
            proxy_pass http://api/health;
            access_log off;
        }

        location / {
            return 404;
        }
    }
}
