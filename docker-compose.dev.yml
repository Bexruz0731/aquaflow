version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: suvpro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: strongpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:strongpassword@postgres:5432/suvpro
      DATABASE_SYNC_URL: postgresql://postgres:strongpassword@postgres:5432/suvpro
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: '["https://akowater.duckdns.org","https://akowater.duckdns.org/admin","https://akowater.duckdns.org/client","https://akowater.duckdns.org/courier","http://localhost:5173","http://localhost:5174","http://localhost:5175"]'
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Vite frontend apps ───────────────────────────────────────────────
  web:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:5175:5175"
    command: sh -c "npm install && npx vite --host --port 5175"
    environment:
      - VITE_API_URL=/api/v1
      - VITE_BACKEND_INTERNAL_URL=http://backend:8000
    depends_on:
      - backend

  client-app:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./client-app:/app
      - client_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    command: sh -c "npm install && npx vite --host --port 5173"
    environment:
      - VITE_API_URL=/api/v1
      - VITE_BACKEND_INTERNAL_URL=http://backend:8000
    depends_on:
      - backend

  courier-app:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./courier-app:/app
      - courier_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:5174:5174"
    command: sh -c "npm install && npx vite --host --port 5174"
    environment:
      - VITE_API_URL=/api/v1
      - VITE_BACKEND_INTERNAL_URL=http://backend:8000
    depends_on:
      - backend

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:strongpassword@postgres:5432/suvpro
      DATABASE_SYNC_URL: postgresql://postgres:strongpassword@postgres:5432/suvpro
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.notifications worker --loglevel=info --concurrency=2
    depends_on:
      - backend
      - redis

  # Туннель для клиентского мини-аппа Telegram


  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./bot/.env
    environment:
      API_BASE_URL: http://backend:8000/api/v1
      REDIS_URL: redis://redis:6379/1
    depends_on:
      - backend
      - redis

  pgbackups:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: suvpro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: strongpassword
      SCHEDULE: "0 1 * * *" # Every day at 01:00 AM
      BACKUP_KEEP_DAYS: 7
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  uploads:
  web_node_modules:
  client_node_modules:
  courier_node_modules:
